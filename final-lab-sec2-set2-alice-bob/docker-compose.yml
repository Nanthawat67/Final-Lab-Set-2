version: "3.9"

services:

  # ── Databases ──────────────────────────────────────────────────────
  auth-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: authdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret123
    ports:
      - "5433:5432"
    volumes:
      - auth_data:/var/lib/postgresql/data
      - ./auth-service/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d authdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  task-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: taskdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret123
    ports:
      - "5434:5432"
    volumes:
      - task_data:/var/lib/postgresql/data
      - ./task-service/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d taskdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  activity-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: activitydb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret123
    ports:
      - "5435:5432"
    volumes:
      - activity_data:/var/lib/postgresql/data
      - ./activity-service/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d activitydb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Services ───────────────────────────────────────────────────────
  auth-service:
    build: ./auth-service
    environment:
      DB_HOST: auth-db
      DB_PORT: 5432
      DB_NAME: authdb
      DB_USER: admin
      DB_PASSWORD: secret123
      JWT_SECRET: ${JWT_SECRET:-dev-shared-secret}
      JWT_EXPIRES: 1h
      PORT: 3001
      NODE_ENV: development
      ACTIVITY_SERVICE_URL: http://activity-service:3003
    ports:
      - "3001:3001"
    depends_on:
      auth-db:
        condition: service_healthy
      activity-service:
        condition: service_started
    restart: unless-stopped

  task-service:
    build: ./task-service
    environment:
      DB_HOST: task-db
      DB_PORT: 5432
      DB_NAME: taskdb
      DB_USER: admin
      DB_PASSWORD: secret123
      JWT_SECRET: ${JWT_SECRET:-dev-shared-secret}
      PORT: 3002
      NODE_ENV: development
      ACTIVITY_SERVICE_URL: http://activity-service:3003
    ports:
      - "3002:3002"
    depends_on:
      task-db:
        condition: service_healthy
      activity-service:
        condition: service_started
    restart: unless-stopped

  activity-service:
    build: ./activity-service
    environment:
      DB_HOST: activity-db
      DB_PORT: 5432
      DB_NAME: activitydb
      DB_USER: admin
      DB_PASSWORD: secret123
      JWT_SECRET: ${JWT_SECRET:-dev-shared-secret}
      PORT: 3003
      NODE_ENV: development
    ports:
      - "3003:3003"
    depends_on:
      activity-db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  auth_data:
  task_data:
  activity_data: