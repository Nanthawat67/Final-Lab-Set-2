version: "3.9"

services:

  auth-db:
    image: postgres:15
    container_name: auth-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: authdb
    volumes:
      - ./auth-service/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - lab-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  task-db:
    image: postgres:15
    container_name: task-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: taskdb
    volumes:
      - ./task-service/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - lab-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  activity-db:
    image: postgres:15
    container_name: activity-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: activitydb
    volumes:
      - ./activity-service/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - lab-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build: ./auth-service
    container_name: auth-service
    restart: always
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@auth-db:5432/authdb
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES: ${JWT_EXPIRES}
    depends_on:
      auth-db:
        condition: service_healthy
    networks:
      - lab-network
    ports:
      - "3001:3001"

  task-service:
    build: ./task-service
    container_name: task-service
    restart: always
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@task-db:5432/taskdb
      JWT_SECRET: ${JWT_SECRET}
      ACTIVITY_SERVICE_URL: http://activity-service:3003
    depends_on:
      task-db:
        condition: service_healthy
    networks:
      - lab-network
    ports:
      - "3002:3002"

  activity-service:
    build: ./activity-service
    container_name: activity-service
    restart: always
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@activity-db:5432/activitydb
    depends_on:
      activity-db:
        condition: service_healthy
    networks:
      - lab-network
    ports:
      - "3003:3003"

  frontend:
    image: nginx:alpine
    container_name: frontend
    volumes:
      - ./frontend:/usr/share/nginx/html
    networks:
      - lab-network
    depends_on:
      - auth-service
      - task-service
      - activity-service

  nginx:
    image: nginx:alpine
    container_name: gateway
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - auth-service
      - task-service
      - activity-service
    networks:
      - lab-network

networks:
  lab-network:
    driver: bridge